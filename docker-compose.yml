# Pull from Docker Hub (default):
#   docker compose up
#
# Build from local source (dev):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  laminus:
    image: ninjabuffalo/laminus:latest
    volumes:
      - laminus-config:/config
      - laminus-data:/data
      # Named volume caches the OrcaSlicer AppImage across restarts.
      # Re-downloaded only when ORCA_VERSION changes.
      - laminus-slicer:/opt/orcaslicer
    shm_size: "1gb"
    environment:
      - TZ=Etc/UTC
      - PYTHONUNBUFFERED=1
      - ORCA_VERSION=${ORCA_VERSION:-2.4.1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  themis:
    image: ninjabuffalo/themis:latest
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - themis-data:/data
    environment:
      - LAMINUS_SIDECAR_URL=http://laminus:5000
      - THEMIS_LIBRARY_DIR=/data/library
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      laminus:
        condition: service_healthy
    restart: unless-stopped

  ordinus:
    image: ninjabuffalo/ordinus:latest
    ports:
      - "${ORDINUS_PORT:-3001}:80"
    volumes:
      - ordinus-config:/config
      - ordinus-data:/data
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=info
      - THEMIS_URL=http://themis:8000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      themis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  themis-data:
  laminus-config:
  laminus-data:
  laminus-slicer:
  ordinus-config:
  ordinus-data:
