services:
  orca:
    build: ../orca
    volumes:
      - ../orca/config:/config
      - ../orca/data:/data
      # Named volume caches the OrcaSlicer AppImage across restarts.
      # Re-downloaded only when ORCA_VERSION changes.
      - orca-slicer:/opt/orcaslicer
    shm_size: "1gb"
    environment:
      - TZ=Etc/UTC
      - PYTHONUNBUFFERED=1
      - ORCA_VERSION=${ORCA_VERSION:-2.4.1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  themis:
    build: ../themis
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - themis-data:/data
    environment:
      - ORCA_SIDECAR_URL=http://orca:5000
      - THEMIS_LIBRARY_DIR=/data/library
    depends_on:
      orca:
        condition: service_healthy
    restart: unless-stopped

volumes:
  themis-data:
  orca-slicer:
