# Standalone test stack with mock services.
# Replaces real Laminus with a fast in-process mock and adds mock Spoolman.
#
# Themis data (/data) is mounted as tmpfs — always fresh on stack startup.
# No `down -v` required between runs; just `docker compose -f ... down && up`.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build
#
# Run tests against it:
#   LAMINUS_URL=http://localhost:5100 pytest tests/e2e/ --integration
#
# Mock Laminus is exposed on port 5100 so tests can call /api/test/known-profile
# directly to discover the stable profile UUIDs needed to register a mock printer.
#
# Ordinus is included so the ordinus-themis integration tests can run:
#   pytest tests/e2e/test_ordinus_themis_integration.py --integration
# Ordinus API is exposed on host port 3002 (nginx → Express on :80 in container).
# Override: ORDINUS_IMAGE=ninjabuffalo/gridfinity-customizer:local

services:
  mock-laminus:
    image: ${MOCK_LAMINUS_IMAGE:-ninjabuffalo/laminus-mock:latest}
    ports:
      - "5100:5000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mock-spoolman:
    build:
      context: tests/e2e/mocks
    command: uvicorn spoolman_mock:app --host 0.0.0.0 --port 7912
    ports:
      - "7912:7912"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7912/api/v1/info')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  themis:
    image: ${THEMIS_IMAGE:-ninjabuffalo/themis:latest}
    ports:
      - "${HOST_PORT:-8001}:8000"
    volumes:
      - type: tmpfs
        target: /data
    environment:
      - LAMINUS_SIDECAR_URL=http://mock-laminus:5000
      - SPOOLMAN_URL=http://mock-spoolman:7912
      - THEMIS_LIBRARY_DIR=/data/library
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mock-laminus:
        condition: service_healthy
      mock-spoolman:
        condition: service_healthy
    restart: unless-stopped

  ordinus:
    image: ${ORDINUS_IMAGE:-ninjabuffalo/gridfinity-customizer:latest}
    ports:
      - "${ORDINUS_PORT:-3002}:80"
    environment:
      - THEMIS_URL=http://themis:8000
      - DB_PATH=:memory:
      - NODE_ENV=test
      - LOG_LEVEL=warn
      - IMAGE_DIR=/tmp/ordinus/images
      - GENERATED_STL_DIR=/tmp/ordinus/generated
      - USER_STL_DIR=/tmp/ordinus/user-stls
      - USER_STL_IMAGE_DIR=/tmp/ordinus/user-stl-images
      - CORS_ORIGIN=*
      - PUBLIC_URL=http://localhost:3002
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      themis:
        condition: service_healthy
    restart: unless-stopped

